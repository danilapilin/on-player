<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сбор ОН</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#f5f6fa; color:#2d3436; }
.header { background:#2d3436; color:#fff; padding:20px 24px; position:sticky; top:0; z-index:10; }
.header h1 { font-size:18px; font-weight:600; }
.header .sub { font-size:13px; opacity:0.7; margin-top:4px; }
.tabs { display:flex; gap:4px; margin-top:10px; }
.tab { padding:8px 18px; border-radius:8px 8px 0 0; font-size:13px; font-weight:600; cursor:pointer;
       background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); border:none; }
.tab.active { background:#f5f6fa; color:#2d3436; }
.controls { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; align-items:center; }
.controls input { padding:8px 12px; border:none; border-radius:6px; font-size:14px; width:220px; }
.controls select { padding:8px 12px; border:none; border-radius:6px; font-size:13px; background:#fff; cursor:pointer; }
.controls .count { font-size:13px; opacity:0.8; margin-left:auto; }
.date-stats { display:flex; gap:16px; margin-top:10px; font-size:12px; opacity:0.8; flex-wrap:wrap; }
.date-stats span { background:rgba(255,255,255,0.1); padding:3px 10px; border-radius:10px; }
.container { max-width:1100px; margin:0 auto; padding:16px; }
.row { background:#fff; border-radius:10px; margin-bottom:10px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.row.matched { border-left:4px solid #00b894; }
.row.mismatched { border-left:4px solid #d63031; }
.row.op-empty { border-left:4px solid #fdcb6e; }
.row.no-recs { border-left:4px solid #dfe6e9; }
.row-top { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.row-num { font-size:12px; color:#b2bec3; min-width:30px; }
.op-badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; color:#fff; }
.site { font-weight:600; font-size:14px; color:#0984e3; word-break:break-all; }
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.badge.green { background:#e8f8e8; color:#00b894; }
.badge.red { background:#ffe8e8; color:#d63031; }
.badge.yellow { background:#fff8e8; color:#e17055; }
.badge.gray { background:#f0f0f0; color:#636e72; }
.badge.ai-agree { background:#e8f0ff; color:#0984e3; }
.badge.ai-disagree { background:#ffe8e8; color:#d63031; }
.badge.ai-only { background:#e8f0ff; color:#a29bfe; }
.badge.ai-op-only { background:#fff0f0; color:#e17055; }
.ai-reasoning { font-size:13px; color:#2d3436; margin:8px 0; padding:12px 16px; background:linear-gradient(135deg, #f0e8ff, #e8f0ff); border-radius:8px; border-left:4px solid #a29bfe; font-weight:500; line-height:1.6; }
.meta { display:flex; gap:20px; font-size:12px; color:#636e72; flex-wrap:wrap; margin-bottom:10px; }
.meta span { display:flex; align-items:center; gap:4px; }
.recordings { margin-top:8px; }
.rec { display:flex; gap:12px; align-items:flex-start; padding:10px; background:#f8f9fa; border-radius:8px; margin-bottom:6px; }
.rec-info { flex:1; min-width:0; }
.rec-callerid { font-weight:600; font-size:13px; }
.rec-conf { font-size:11px; color:#636e72; }
.rec-text { font-size:12px; color:#2d3436; margin-top:4px; line-height:1.5; max-height:60px; overflow:hidden; }
.rec-text.expanded { max-height:none; }
.expand-btn { font-size:11px; color:#0984e3; cursor:pointer; border:none; background:none; margin-top:2px;
  user-select:none; -webkit-user-select:none; padding:4px 8px; position:relative; z-index:1; }
.audio-btn { flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  width:36px; height:36px; background:#0984e3; color:#fff; border-radius:50%; font-size:14px;
  border:none; cursor:pointer; }
.audio-btn:hover { background:#0770c2; }
.audio-btn.playing { background:#d63031; }
.audio-inline { flex-shrink:0; width:220px; height:32px; margin-top:4px; }
.empty { text-align:center; padding:40px; color:#b2bec3; font-size:14px; }
.load-more { display:block; width:100%; padding:14px; background:#fff; border:2px dashed #dfe6e9; border-radius:10px; font-size:14px; color:#0984e3; cursor:pointer; text-align:center; margin:10px 0; font-weight:600; }
.load-more:hover { background:#f0f7ff; border-color:#0984e3; }
.loading { text-align:center; padding:40px; color:#b2bec3; font-size:14px; }

/* Analytics */
.analytics { display:none; }
.analytics.visible { display:block; }
.player-view { display:block; }
.player-view.hidden { display:none; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.card h2 { font-size:16px; font-weight:600; margin-bottom:16px; color:#2d3436; }
.card h3 { font-size:14px; font-weight:600; margin:16px 0 8px; color:#636e72; }
.stat-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:10px; margin-bottom:20px; }
.stat-box { background:#f8f9fa; border-radius:10px; padding:12px 8px; text-align:center; }
.stat-box .val { font-size:24px; font-weight:700; color:#0984e3; }
.stat-box .lbl { font-size:12px; color:#636e72; margin-top:4px; }
.stat-box.green .val { color:#00b894; }
.stat-box.red .val { color:#d63031; }
.stat-box.yellow .val { color:#e17055; }

/* Chart */
.chart { margin:12px 0; }
.chart-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.chart-label { width:50px; font-size:12px; color:#636e72; text-align:right; flex-shrink:0; }
.chart-bar-wrap { flex:1; height:24px; background:#f0f0f0; border-radius:4px; position:relative; overflow:hidden; }
.chart-bar { height:100%; border-radius:4px; transition:width 0.5s; display:flex; }
.chart-bar .seg { height:100%; }
.chart-bar .seg.matched { background:#00b894; }
.chart-bar .seg.mismatched { background:#d63031; }
.chart-bar .seg.op-empty { background:#fdcb6e; }
.chart-bar .seg.no-recs { background:#dfe6e9; }
.chart-val { width:50px; font-size:12px; font-weight:600; color:#2d3436; flex-shrink:0; }

/* Table */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th { text-align:left; padding:8px 12px; background:#f8f9fa; font-weight:600; color:#636e72; border-bottom:2px solid #dfe6e9; }
.tbl td { padding:8px 12px; border-bottom:1px solid #f0f0f0; }
.tbl tr:hover td { background:#f8f9fa; }
.tbl tr.row-grand:hover td { background:#2d3436; color:#fff; }
.tbl tr.row-grand td { background:#2d3436; color:#fff; }
.tbl tr.row-subtotal td { background:#f0f0f0; }
.tbl tr.row-subtotal:hover td { background:#e8e8e8; }
.section-divider { border:none; border-top:2px solid #dfe6e9; margin:8px 0 20px; }
.tbl .num { text-align:right; font-variant-numeric:tabular-nums; }

.legend { display:flex; gap:16px; margin:12px 0; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:12px; color:#636e72; }
.legend-dot { width:12px; height:12px; border-radius:3px; }

/* Disagree comparison block */
.disagree-compare { display:flex; gap:12px; margin:10px 0; }
.disagree-compare .pick { flex:1; padding:10px 12px; border-radius:8px; font-size:13px; }
.disagree-compare .pick.op-pick { background:#e8f8e8; border:2px solid #00b894; }
.disagree-compare .pick.ai-pick { background:#f0e8ff; border:2px solid #a29bfe; }
.disagree-compare .pick .pick-label { font-size:11px; font-weight:700; margin-bottom:4px; }
.disagree-compare .pick .pick-phone { font-size:15px; font-weight:700; }

/* Recording highlights */
.rec.rec-op-pick { border-left:3px solid #00b894; background:#f0faf0; }
.rec.rec-ai-pick { border-left:3px solid #a29bfe; background:#f5f0ff; }
.rec.rec-op-pick.rec-ai-pick { border-left:3px solid #0984e3; background:#f0f7ff; }
.rec-tag { font-size:10px; font-weight:600; margin-left:4px; padding:1px 5px; border-radius:6px; }
.rec-tag.tag-op { background:#e8f8e8; color:#00b894; }
.rec-tag.tag-ai { background:#f0e8ff; color:#a29bfe; }

/* Clickable cells in AI review matrix */
.clickable { cursor:pointer; }
.clickable:hover { text-decoration:underline; opacity:0.8; }

/* Verdict buttons for operator review */
.verdict-bar { display:flex; gap:8px; align-items:center; margin:8px 0; flex-wrap:wrap; }
.verdict-bar .verdict-row2 { display:flex; gap:8px; align-items:center; width:100%; margin-top:4px; }
.verdict-btn { padding:6px 14px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer;
  border:2px solid #dfe6e9; background:#fff; color:#636e72; transition:all 0.15s; }
.verdict-btn:hover { border-color:#b2bec3; }
.verdict-btn.active-ai { border-color:#a29bfe; background:#f0e8ff; color:#a29bfe; }
.verdict-btn.active-op { border-color:#00b894; background:#e8f8e8; color:#00b894; }
.verdict-btn.active-both-right { border-color:#0984e3; background:#e8f0ff; color:#0984e3; }
.verdict-btn.active-both-wrong { border-color:#e17055; background:#fff0e8; color:#e17055; }
.verdict-comment { flex:1; min-width:0; width:100%; padding:8px 12px; border:1px solid #dfe6e9; border-radius:8px;
  font-size:12px; outline:none; }
.verdict-comment:focus { border-color:#a29bfe; }
.verdict-btn.active-ai-wrong { border-color:#d63031; background:#ffe8e8; color:#d63031; }
.verdict-saved { font-size:11px; color:#00b894; margin-left:8px; opacity:0; transition:opacity 0.3s; }
.verdict-saved.show { opacity:1; }

/* Focus nav inside header */
#stickyNav:empty { display:none; }
#stickyNav { margin-top:8px; }
.disagree-nav { display:flex; gap:12px; align-items:center; justify-content:center;
  padding:8px 16px; background:rgba(255,255,255,0.1); border-radius:8px; }
.disagree-nav button { padding:6px 16px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.15); color:#fff; }
.disagree-nav button:hover { background:rgba(255,255,255,0.25); }
.disagree-nav button[disabled] { opacity:0.3; cursor:default; }
.disagree-nav button[disabled]:hover { background:rgba(255,255,255,0.15); }
.disagree-nav .nav-counter { font-size:13px; font-weight:600; color:rgba(255,255,255,0.9); }
.disagree-nav .nav-reviewed { font-size:12px; color:#55efc4; }
.disagree-nav .export-btn { background:#a29bfe; color:#fff; border-color:#a29bfe; margin-left:auto; }
.disagree-nav .export-btn:hover { background:#8c7ae6; }

/* Reviewed row — green checkmark indicator, NOT dimmed */
.row-reviewed { border-right:4px solid #00b894; }
.row-reviewed .verdict-bar::after { content:' \2714 Проверено'; color:#00b894; font-size:12px; font-weight:600; }

/* Mini bar in matrix — accuracy (green/red) */
.mini-bar { display:inline-flex; width:60px; height:8px; border-radius:4px; overflow:hidden; vertical-align:middle; margin-left:6px; }
.mini-bar .mb-agree { background:#00b894; height:100%; }
.mini-bar .mb-disagree { background:#d63031; height:100%; }
/* Mini bar — potential (blue/gray) */
.mini-bar .mb-covered { background:#0984e3; height:100%; }
.mini-bar .mb-uncovered { background:#dfe6e9; height:100%; }
</style>
</head>
<body>

<div class="header">
  <h1>Сбор ОН</h1>
  <div class="sub" id="subtitle">Загрузка...</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('player')">Записи</button>
    <button class="tab" onclick="switchTab('analytics')">Аналитика</button>
  </div>
  <div class="controls player-controls" id="playerControls">
    <select id="groupFilter" onchange="switchGroup(parseInt(this.value))">
      <option value="1">Группа 1</option>
      <option value="2">Группа 2</option>
      <option value="3">Группа 3</option>
      <option value="4">Группа 4</option>
    </select>
    <select id="dateFilter"><option value="">Загрузка дат...</option></select>
    <input type="text" id="search" placeholder="Поиск по сайту, номеру, тексту...">
    <select id="opFilter">
      <option value="all">Все операторы</option>
    </select>
    <select id="filter">
      <option value="all">Все статусы</option>
      <option value="matched">Совпал</option>
      <option value="mismatched">Не совпал</option>
      <option value="op-empty">Оператор пусто</option>
      <option value="no-recs">Нет записей</option>
    </select>
    <select id="aiFilter">
      <option value="all">AI: все</option>
      <option value="agree">AI: совпал</option>
      <option value="disagree">AI: расхождение</option>
      <option value="ai_only">AI: только AI</option>
      <option value="op_only">AI: только оператор</option>
    </select>
    <div class="count" id="count"></div>
  </div>
  <div class="date-stats" id="dateStats"></div>
  <div id="stickyNav"></div>
</div>
<div class="player-view" id="playerView">
  <div class="container" id="list"></div>
</div>

<div class="analytics" id="analyticsView">
  <div class="container" id="analyticsContent"></div>
</div>



<script>
let DATA = [];
let DATES = [];
let FILTERED = [];
let SHOWN = 0;
const PAGE = 50;
let currentTab = "player";
let currentGroup = 1;
let focusMode = false;
let focusIdx = 0;
let ALL_GROUPS = {}; // {1: [dates], 2: [dates], ...} for cross-group analytics

// dynamic color palette for operators (assigned by position in loaded data)
const OP_PALETTE = ["#636e72", "#a29bfe", "#fd79a8", "#00cec9"];
let OP_COLORS = {};

function getBase() { return `data/group${currentGroup}/`; }

function assignOpColors() {
  const ops = [...new Set(DATA.map(d => d.operator))];
  OP_COLORS = {};
  ops.forEach((op, i) => { OP_COLORS[op] = OP_PALETTE[i % OP_PALETTE.length]; });
}

function populateOperators() {
  const ops = [...new Set(DATA.map(d => d.operator))];
  const sel = document.getElementById("opFilter");
  const prev = sel.value;
  sel.innerHTML = '<option value="all">Все операторы</option>' +
    ops.map(op => `<option value="${op}">${op}</option>`).join("");
  if (ops.includes(prev)) sel.value = prev;
}

function switchGroup(num) {
  currentGroup = num;
  document.getElementById("groupFilter").value = num;
  return loadGroup().then(() => saveFilters());
}

async function switchTab(tab) {
  currentTab = tab;
  const tabIdx = {player:0, analytics:1};
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === tabIdx[tab]));
  document.getElementById("playerView").classList.toggle("hidden", tab !== "player");
  document.getElementById("playerControls").style.display = tab === "player" ? "flex" : "none";
  document.getElementById("dateStats").style.display = tab === "player" ? "flex" : "none";
  document.getElementById("analyticsView").classList.toggle("visible", tab === "analytics");
  // hide focus nav when not in player tab
  if (tab !== "player") {
    document.getElementById("stickyNav").innerHTML = '';
    focusMode = false;
  }
  if (tab === "analytics") {
    document.getElementById("analyticsContent").innerHTML = '<div class="loading">Загрузка аналитики...</div>';
    await loadAllGroupsData();
    renderAnalytics();
  }
}

async function loadAllGroupsData() {
  const fetches = [];
  for (let g = 1; g <= 4; g++) {
    if (ALL_GROUPS[g]) continue;
    fetches.push(
      fetch(`data/group${g}/dates.json`)
        .then(r => r.json())
        .then(data => { ALL_GROUPS[g] = data; })
        .catch(() => {})
    );
  }
  await Promise.all(fetches);
}

function statusInfo(st) {
  const map = {
    "Совпал": { cls: "matched", badge: "green", label: "Совпал" },
    "Не совпал": { cls: "mismatched", badge: "red", label: "Не совпал" },
    "Оператор пусто, есть звонки": { cls: "op-empty", badge: "yellow", label: "Оператор пусто" },
    "Нет записей": { cls: "no-recs", badge: "gray", label: "Нет записей" },
    "Оператор нашёл, записей нет": { cls: "no-recs", badge: "gray", label: "Оп. нашёл, нет записей" },
  };
  return map[st] || { cls: "", badge: "gray", label: st };
}

function updateStatusCounts() {
  const op = document.getElementById("opFilter").value;
  const base = op === "all" ? DATA : DATA.filter(d => d.operator === op);
  const c = {};
  base.forEach(d => { c[d.status] = (c[d.status] || 0) + 1; });
  const sel = document.getElementById("filter");
  sel.options[1].textContent = `Совпал (${c["Совпал"]||0})`;
  sel.options[2].textContent = `Не совпал (${c["Не совпал"]||0})`;
  sel.options[3].textContent = `Оператор пусто (${c["Оператор пусто, есть звонки"]||0})`;
  sel.options[4].textContent = `Нет записей (${(c["Нет записей"]||0)+(c["Оператор нашёл, записей нет"]||0)})`;
}

function aiInfo(vs) {
  const map = {
    "agree":      { badge: "ai-agree",    label: "AI \u2714" },
    "disagree":   { badge: "ai-disagree", label: "AI \u2716" },
    "ai_only":    { badge: "ai-only",     label: "AI only" },
    "op_only":    { badge: "ai-op-only",  label: "Op only" },
  };
  return map[vs] || null;
}

function applyFilters() {
  const query = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;
  const opFilter = document.getElementById("opFilter").value;
  const aiFilterVal = document.getElementById("aiFilter").value;

  FILTERED = DATA.filter(d => {
    if (opFilter !== "all" && d.operator !== opFilter) return false;
    if (filter === "matched" && d.status !== "Совпал") return false;
    if (filter === "mismatched" && d.status !== "Не совпал") return false;
    if (filter === "op-empty" && d.status !== "Оператор пусто, есть звонки") return false;
    if (filter === "no-recs" && !d.status.includes("Нет записей") && d.status !== "Оператор нашёл, записей нет") return false;
    if (aiFilterVal !== "all" && d.ai_vs_op !== aiFilterVal) return false;
    if (query) {
      const h = [d.site, d.phone, d.operator_phone, d.nisha, d.client, d.operator,
        d.ai_phone || "", d.ai_reasoning || "",
        ...d.recs.map(r => r.callerid + " " + r.transcript)].join(" ").toLowerCase();
      if (!h.includes(query)) return false;
    }
    return true;
  });

  SHOWN = 0;
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";
  const stickyNav = document.getElementById("stickyNav");
  const aiFilterVal2 = document.getElementById("aiFilter").value;

  // always use focus mode — one card at a time
  focusMode = true;
  focusIdx = 0;
  renderFocusMode();
}

function renderRow(d, globalIdx) {
  const si = statusInfo(d.status);
  const opColor = OP_COLORS[d.operator] || "#636e72";
  const ai = aiInfo(d.ai_vs_op);
  const aiBadgeHtml = ai ? `<span class="badge ${ai.badge}">${ai.label}</span>` : "";

  // highlight recordings that match operator or AI picks
  const recsHtml = d.recs.length ? d.recs.map((r, ri) => {
    const isOpPick = d.operator_phone && (r.callerid === d.operator_phone || d.operator_phone.includes(r.callerid) || r.callerid.includes(d.operator_phone));
    const isAiPick = d.ai_phone && (r.callerid === d.ai_phone || d.ai_phone.includes(r.callerid) || r.callerid.includes(d.ai_phone));
    const recCls = isOpPick && isAiPick ? 'rec rec-op-pick rec-ai-pick' : isOpPick ? 'rec rec-op-pick' : isAiPick ? 'rec rec-ai-pick' : 'rec';
    const tags = (isOpPick ? '<span class="rec-tag tag-op">ОП</span>' : '') + (isAiPick ? '<span class="rec-tag tag-ai">AI</span>' : '');
    return `
    <div class="${recCls}">
      <div class="rec-info">
        <span class="rec-callerid">${r.callerid}</span>
        <span class="rec-conf">&nbsp;&middot;&nbsp;${r.conf}</span>
        ${tags}
        <div class="rec-text">${escHtml(r.transcript)}</div>
        ${r.transcript.length > 120 ? '<button class="expand-btn" onclick="toggleText(this)">показать всё</button>' : ""}
      </div>
      ${r.audio ? `<button class="audio-btn" onclick="playAudio(this,'${escAttr(r.audio)}')">&#9654;</button>` : ""}
    </div>`;
  }).join("") : '<div style="font-size:12px;color:#b2bec3;padding:8px">Нет записей с речью</div>';

  const aiReasonHtml = d.ai_reasoning ? `<div class="ai-reasoning"><strong style="color:#a29bfe">AI:</strong> ${escHtml(d.ai_reasoning)}${d.ai_phone ? " <strong style='color:#a29bfe'>\u2192 " + d.ai_phone + "</strong>" : ""}</div>` : "";

  // comparison block — unified two-column layout for all AI statuses
  let compareHtml = '';

  // agree: both picked the same — show side by side (no verdict needed)
  if (d.ai_vs_op === 'agree' && d.operator_phone && d.ai_phone) {
    const matchRec = d.recs.find(r => r.callerid === d.operator_phone || d.operator_phone.includes(r.callerid) || r.callerid.includes(d.operator_phone));
    const matchSnippet = matchRec ? escHtml(matchRec.transcript.slice(0, 100)) + (matchRec.transcript.length > 100 ? '...' : '') : '';
    const matchAudio = matchRec?.audio ? `<button class="audio-btn" style="width:28px;height:28px;font-size:11px;margin-top:6px" onclick="playAudio(this,'${escAttr(matchRec.audio)}')">&#9654;</button>` : '';
    compareHtml = `<div class="disagree-compare">
      <div class="pick op-pick">
        <div class="pick-label">Оператор</div>
        <div class="pick-phone">${escHtml(d.operator_phone)}</div>

  if (d.ai_vs_op === 'ai_only' && d.ai_phone) {

    const v = getVerdict(currentGroup, document.getElementById('dateFilter').value, d.idx);
    const vAi = v?.verdict === 'ai' ? ' active-ai' : '';
    const vWrong = v?.verdict === 'ai_wrong' ? ' active-ai-wrong' : '';
    const vComment = v?.comment || '';

    compareHtml = `<div class="disagree-compare">
      <div class="pick op-pick" style="opacity:0.5">
        <div class="pick-label">Оператор</div>
        <div class="pick-phone" style="color:#b2bec3">\u2014 пусто</div>
      </div>

  // op_only: operator found, AI didn't — with verdict buttons
  if (d.ai_vs_op === 'op_only' && d.operator_phone) {

    const opAudio2 = opRec2?.audio ? `<button class="audio-btn" style="width:28px;height:28px;font-size:11px;margin-top:6px" onclick="playAudio(this,'${escAttr(opRec2.audio)}')">&#9654;</button>` : '';

    const _date = document.getElementById('dateFilter').value;
    const v = getVerdict(currentGroup, _date, d.idx);
    const vComment = v?.comment || '';

    const vOpWrong = v?.verdict === 'op_wrong' ? ' active-both-wrong' : '';

    compareHtml = `<div class="disagree-compare">

        ${opAudio2}

      <div class="pick ai-pick" style="opacity:0.5">

      </div>
    </div>
    <div class="verdict-bar" data-idx="${d.idx}">
      <button class="verdict-btn${vOp}" onclick="setVerdict(this,${d.idx},'op')">ОП верно</button>
      <button class="verdict-btn${vOpWrong}" onclick="setVerdict(this,${d.idx},'op_wrong')">ОП неверно</button>
      <span class="verdict-saved" id="saved-${d.idx}">Сохранено</span>
      <div class="verdict-row2">
        <input class="verdict-comment" placeholder="Комментарий..." value="${escAttr(vComment)}" onchange="setComment(${d.idx}, this.value)">
      </div>
    </div>`;
  }

  const disagreeClass = d.ai_vs_op === 'disagree' ? ' row-disagree' : d.ai_vs_op === 'ai_only' ? ' row-ai-only' : d.ai_vs_op === 'op_only' ? ' row-op-only' : '';

  return `
    <div class="row ${si.cls}${disagreeClass}">
      <div class="row-top">
        <span class="row-num">#${d.idx}</span>
        <span class="op-badge" style="background:${opColor}">${escHtml(d.operator)}</span>
        <span class="site">${escHtml(d.site)}</span>
        <span class="badge ${si.badge}">${si.label}</span>
        ${aiBadgeHtml}
      </div>
      <div class="meta">
        <span>Тел: <b>${d.phone}</b></span>
        <span>Оператор: <b>${d.operator_phone || "\u2014"}</b></span>
        <span>Записей: ${d.total_recs} (sil: ${d.silence}, речь: ${d.recs.length})</span>
        <span>Ниша: ${d.nisha || "\u2014"}</span>
      </div>
      ${compareHtml}
      ${aiReasonHtml}
      <div class="recordings">${recsHtml}</div>
    </div>`;
}

function showMore() {
  const container = document.getElementById("list");
  const oldBtn = document.getElementById("loadMoreBtn");
  if (oldBtn) oldBtn.remove();

  if (!FILTERED.length && SHOWN === 0) {
    container.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }

  const end = Math.min(SHOWN + PAGE, FILTERED.length);
  let html = "";
  for (let i = SHOWN; i < end; i++) {
    html += renderRow(FILTERED[i], i);
  }
  container.insertAdjacentHTML("beforeend", html);
  SHOWN = end;

  document.getElementById("count").textContent = `Показано: ${SHOWN} из ${FILTERED.length}`;

  if (SHOWN < FILTERED.length) {
    container.insertAdjacentHTML("beforeend",
      `<button class="load-more" id="loadMoreBtn" onclick="showMore()">Показать ещё ${Math.min(PAGE, FILTERED.length - SHOWN)} из ${FILTERED.length - SHOWN} оставшихся</button>`);
  }
}

function toggleText(btn) {
  const el = btn.previousElementSibling;
  if (!el) return;
  const isExpanded = el.style.maxHeight === 'none';
  el.style.maxHeight = isExpanded ? '' : 'none';
  el.style.overflow = isExpanded ? '' : 'visible';
  btn.textContent = isExpanded ? 'показать всё' : 'свернуть';
}

function escHtml(s) { return s ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }
function escAttr(s) { return s ? s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;") : ""; }

function setVerdict(btn, idx, verdict) {
  const bar = btn.closest('.verdict-bar');
  const row = bar.closest('.row');
  const date = document.getElementById('dateFilter').value;
  const existing = getVerdict(currentGroup, date, idx);
  const comment = bar.querySelector('.verdict-comment').value;

  // toggle off if same verdict clicked again
  if (existing?.verdict === verdict) {
    localStorage.removeItem(`review_${currentGroup}_${date}_${idx}`);
    bar.querySelectorAll('.verdict-btn').forEach(b => b.className = 'verdict-btn');
    if (row) row.classList.remove('row-reviewed');
    updateReviewCounter();
    return;
  }

  // set active button style
  bar.querySelectorAll('.verdict-btn').forEach(b => b.className = 'verdict-btn');
  const cls = {ai:'active-ai', op:'active-op', both_right:'active-both-right', both_wrong:'active-both-wrong', ai_wrong:'active-ai-wrong', op_wrong:'active-both-wrong'};
  btn.classList.add(cls[verdict] || 'active-both-wrong');
  saveVerdict(currentGroup, date, idx, verdict, comment);

  // dim the row to indicate it's reviewed
  if (row) row.classList.add('row-reviewed');

  // update counter
  updateReviewCounter();

}

function setComment(idx, comment) {
  const date = document.getElementById('dateFilter').value;
  const existing = getVerdict(currentGroup, date, idx);
  if (existing) {
    saveVerdict(currentGroup, date, idx, existing.verdict, comment);
  }
}

// Audio playback:
// On HTTPS: proxy HTTP audio through /audio/ (Cloudflare Pages Function) for inline playback.
// On HTTP: play directly.
function getAudioUrl(rawUrl) {
  if (location.protocol === 'https:' && rawUrl.startsWith('http:')) {
    return rawUrl.replace('http://assist.intmarksol.com/api/', '/audio/');
  }
  return rawUrl;
}

function playAudio(btn, rawUrl) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.remove();
    const oldBtn = document.querySelector('.audio-btn.playing');
    if (oldBtn) { oldBtn.classList.remove('playing'); oldBtn.innerHTML = '&#9654;'; }
    if (currentAudio._btn === btn) { currentAudio = null; return; }
    currentAudio = null;
  }

  const audio = document.createElement('audio');
  audio.controls = true;
  audio.className = 'audio-inline';
  audio.src = getAudioUrl(rawUrl);
  audio._btn = btn;
  btn.parentElement.appendChild(audio);
  btn.classList.add('playing');
  btn.innerHTML = '&#9632;';
  currentAudio = audio;

  const cleanup = () => {
    btn.classList.remove('playing');
    btn.innerHTML = '&#9654;';
    audio.remove();
    currentAudio = null;
  };
  audio.addEventListener('ended', cleanup);
  audio.addEventListener('error', cleanup);
  audio.play().catch(cleanup);
}
let currentAudio = null;

// ─── Analytics (cross-group dashboard) ───

function rcColor(v) { return v >= 90 ? '#00b894' : v >= 70 ? '#e17055' : '#d63031'; }

// ─── Analytics: Operator recall ───

let analyticsDate = null;

function renderAnalytics(selectedDate) {
  const c = document.getElementById("analyticsContent");
  const gNums = Object.keys(ALL_GROUPS).map(Number).sort();
  if (!gNums.length) { c.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  const GC = ['','#0984e3','#00b894','#e17055','#d63031'];
  const allDates = [...new Set(gNums.flatMap(g => ALL_GROUPS[g].map(d => d.date)))].sort();
  const dl = {}; gNums.forEach(g => ALL_GROUPS[g].forEach(d => { dl[d.date] = d.label; }));

  // aggregate by date (recall metrics)
  const byDate = {};
  allDates.forEach(date => {
    const a = { sites:0, matched:0, mismatched:0, op_empty:0, no_recs:0, uph:0 };
    gNums.forEach(g => {
      const d = ALL_GROUPS[g].find(x => x.date === date);
      if (d) { a.sites+=d.sites; a.matched+=d.matched; a.mismatched+=d.mismatched; a.op_empty+=d.op_empty; a.no_recs+=d.no_recs; a.uph+=(d.unique_phones||0); }
    });
    a.recall = (a.matched+a.mismatched) ? Math.round(a.matched/(a.matched+a.mismatched)*100) : 0;
    a.uon_pct = a.sites ? Math.round(a.uph / a.sites * 1000) / 10 : 0; // % УОН = unique / sites
    byDate[date] = a;
  });

  // default: previous-to-last (yesterday's completed data)
  let reportDate;
  if (selectedDate && allDates.includes(selectedDate)) {
    reportDate = selectedDate;
  } else if (allDates.length >= 2) {
    reportDate = allDates[allDates.length - 2];
  } else {
    reportDate = allDates[allDates.length - 1];
  }
  analyticsDate = reportDate;
  const reportIdx = allDates.indexOf(reportDate);
  const prevDate = reportIdx > 0 ? allDates[reportIdx - 1] : null;
  const last = byDate[reportDate];
  const prev = prevDate ? byDate[prevDate] : null;

  // week-over-week: find date ~7 days before reportDate
  const reportDateObj = new Date(reportDate);
  let weekAgoDate = null;
  for (let i = reportIdx - 1; i >= 0; i--) {
    const diff = (reportDateObj - new Date(allDates[i])) / 86400000;
    if (diff >= 5) { weekAgoDate = allDates[i]; break; }
  }
  const weekAgo = weekAgoDate ? byDate[weekAgoDate] : null;

  function dlt(cur, prv, up) {
    if (prv === null || prv === undefined) return '';
    const d = cur - prv; if (d === 0) return '';
    const ok = up === undefined ? d > 0 : (up ? d > 0 : d < 0);
    return `<span style="font-size:12px;color:${ok?'#00b894':'#d63031'};margin-left:4px">${d>0?'↑':'↓'}${Math.abs(d)}</span>`;
  }
  function dltBlock(cur, prv, up) {
    if (prv === null || prv === undefined) return '';
    const d = cur - prv; if (d === 0) return '';
    const ok = up === undefined ? d > 0 : (up ? d > 0 : d < 0);
    return `<div style="font-size:12px;margin-top:2px;color:${ok?'#00b894':'#d63031'}">${d>0?'↑':'↓'}${Math.abs(d)}</div>`;
  }
  function potColor(v) { return v >= 80 ? '#00b894' : v >= 60 ? '#e17055' : '#d63031'; }

  // date selector
  let html = `<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
    <label style="font-weight:600;font-size:14px">Дата:</label>
    <select onchange="renderAnalytics(this.value)" style="padding:8px 12px;border:1px solid #dfe6e9;border-radius:6px;font-size:13px">
      ${allDates.map(d => `<option value="${d}" ${d === reportDate ? 'selected' : ''}>${dl[d]}</option>`).join('')}
    </select>
  </div>`;

  // ═══ SECTION 1: Сбор ОН (recall + УОН) ═══
  html += `<div class="card"><h2>Сбор ОН — ${dl[reportDate]}</h2>
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-box green"><div class="val">${last.recall}%</div><div class="lbl">Recall</div>${dltBlock(last.recall, prev?.recall, true)}</div>
      <div class="stat-box"><div class="val">${last.uph}</div><div class="lbl">УОН (уник. номера)</div>${dltBlock(last.uph, prev?.uph, true)}</div>
      <div class="stat-box"><div class="val">${last.uon_pct}%</div><div class="lbl">% УОН</div>${dltBlock(last.uon_pct, prev?.uon_pct, true)}</div>
      <div class="stat-box"><div class="val">${last.sites}</div><div class="lbl">Проверок (ОН)</div>${dltBlock(last.sites, prev?.sites, true)}</div>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#636e72">
      <span>Совпал: <b style="color:#00b894">${last.matched}</b></span>
      <span>Не совпал: <b style="color:#d63031">${last.mismatched}</b></span>
      <span>Оп. пусто: ${last.op_empty}</span>
      <span>Нет записей: ${last.no_recs}</span>
    </div>`;

  // week-over-week comparison
  if (weekAgo) {
    const dSites = last.sites - weekAgo.sites;
    const dUph = last.uph - weekAgo.uph;
    const dUon = Math.round((last.uon_pct - weekAgo.uon_pct) * 10) / 10;
    const dRecall = last.recall - weekAgo.recall;
    html += `<div style="margin-top:12px;padding:10px 14px;background:#f0f7ff;border-radius:8px;font-size:13px;color:#636e72">
      <b>По сравнению с ${dl[weekAgoDate]}:</b>
      ОН ${dSites >= 0 ? '+' : ''}${dSites}${dlt(last.sites, weekAgo.sites, true)},
      УОН ${dUph >= 0 ? '+' : ''}${dUph}${dlt(last.uph, weekAgo.uph, true)},
      %УОН ${dUon >= 0 ? '+' : ''}${dUon}%${dlt(last.uon_pct, weekAgo.uon_pct, true)},
      Recall ${dRecall >= 0 ? '+' : ''}${dRecall}%${dlt(last.recall, weekAgo.recall, true)}
    </div>`;
  }
  html += `</div>`;

  // ═══ SECTION 2: AI Matching ═══
  // AI aggregates for report date
  let totAgree=0, totDisagree=0, totAiOnly=0, totOpOnly=0, totProcessed=0;
  let prevAgree=0, prevDisagree=0, prevAiOnly=0, prevProcessed=0;
  const hasAi = gNums.some(g => { const d = ALL_GROUPS[g].find(x => x.date === reportDate); return d?.ai?.processed > 0; });

  if (hasAi) {
    gNums.forEach(g => {
      const d = ALL_GROUPS[g].find(x => x.date === reportDate);
      if (d?.ai) { totAgree+=d.ai.agree||0; totDisagree+=d.ai.disagree||0; totAiOnly+=d.ai.ai_only||0; totOpOnly+=d.ai.op_only||0; totProcessed+=d.ai.processed||0; }
      if (prevDate) {
        const p = ALL_GROUPS[g].find(x => x.date === prevDate);
        if (p?.ai) { prevAgree+=p.ai.agree||0; prevDisagree+=p.ai.disagree||0; prevAiOnly+=p.ai.ai_only||0; prevProcessed+=p.ai.processed||0; }
      }
    });
    const totDec = totAgree + totDisagree;
    const totAcc = totDec ? Math.round(totAgree / totDec * 100) : 0;
    const totPot = totProcessed ? Math.round((totAgree + totAiOnly) / totProcessed * 100) : 0;
    const prevDec = prevAgree + prevDisagree;
    const prevAcc = prevDec ? Math.round(prevAgree / prevDec * 100) : 0;
    const prevPot = prevProcessed ? Math.round((prevAgree + prevAiOnly) / prevProcessed * 100) : 0;

    // count reviewed verdicts
    let totalReviewed = 0;
    const totalToReview = totDisagree + totAiOnly + totOpOnly;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.match(new RegExp(`^review_\\d+_${reportDate}_`))) totalReviewed++;
    }

    html += `<div class="card"><h2>AI Matching — ${dl[reportDate]}</h2>
      <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-box" style="border:2px solid #a29bfe"><div class="val" style="color:#a29bfe">${totAcc}%</div><div class="lbl">Точность</div><div style="font-size:11px;color:#636e72">AI=ОП / (AI=ОП + AI≠ОП)</div>${dltBlock(totAcc, prevDate ? prevAcc : null, true)}</div>
        <div class="stat-box" style="border:2px solid ${potColor(totPot)}"><div class="val" style="color:${potColor(totPot)}">${totPot}%</div><div class="lbl">Потенциал</div><div style="font-size:11px;color:#636e72">(AI=ОП + Только AI) / Всего</div>${dltBlock(totPot, prevDate ? prevPot : null, true)}</div>
        <div class="stat-box"><div class="val">${totProcessed}</div><div class="lbl">Обработано</div></div>
        <div class="stat-box" style="border:2px solid ${totalReviewed >= totalToReview ? '#00b894' : '#e17055'}"><div class="val" style="color:${totalReviewed >= totalToReview ? '#00b894' : '#e17055'}">${totalReviewed}/${totalToReview}</div><div class="lbl">Проверено</div><div style="font-size:11px;color:#636e72">вердиктов</div></div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#636e72">
        <span style="color:#00b894;font-weight:600">AI=ОП: ${totAgree}</span>
        <span style="color:#d63031;font-weight:600">AI≠ОП: ${totDisagree}</span>
        <span style="color:#a29bfe;font-weight:600">Только AI: ${totAiOnly}</span>
        <span style="color:#e17055">Только ОП: ${totOpOnly}</span>
      </div>
    </div>`;

    // ═══ SECTION 3: Объединённая матрица (recall + AI) ═══
    html += `<div class="card"><h2>Матрица по операторам</h2>
      <p style="font-size:12px;color:#636e72;margin-bottom:12px">Кликните на число для перехода к записям.</p>
      <div style="overflow-x:auto">
      <table class="tbl">
      <tr><th>Группа</th><th>Оператор</th><th class="num">Recall</th><th class="num">AI=ОП</th><th class="num">AI≠ОП</th><th class="num">Только AI</th><th class="num">Только ОП</th><th class="num">Точность</th><th class="num">Потенциал</th></tr>`;

    let grandAgree=0, grandDisagree=0, grandAiOnly=0, grandOpOnly=0, grandProcessed=0;
    let grandMatched=0, grandMismatched=0;
    gNums.forEach(g => {
      const d = ALL_GROUPS[g].find(x => x.date === reportDate);
      if (!d || !d.ai_operators) return;
      const ops = Object.keys(d.ai_operators);
      ops.forEach((op, i) => {
        const s = d.ai_operators[op];
        const acc = s.accuracy;
        const pot = s.processed ? Math.round((s.agree + s.ai_only) / s.processed * 100) : 0;
        const accColor = acc >= 85 ? '#00b894' : acc >= 70 ? '#e17055' : '#d63031';
        const decided = s.agree + s.disagree;
        const barW = decided > 0 ? Math.round(s.agree / decided * 100) : 0;
        // get operator recall from date data
        const opRecall = d.operators?.[op]?.recall;
        const recallHtml = opRecall !== undefined ? `<span style="color:${rcColor(opRecall)};font-weight:600">${opRecall}%</span>` : '\u2014';
        const grpLabel = i === 0 ? `<td rowspan="${ops.length}" style="font-weight:600;color:${GC[g]}">Гр.${g}</td>` : '';
        html += `<tr>${grpLabel}<td>${op}<div style="font-size:11px;color:#b2bec3">${s.processed} обр.</div></td>
          <td class="num">${recallHtml}</td>
          <td class="num clickable" style="color:#00b894;font-weight:600" onclick="goToPlayer(${g},'${reportDate}','${op}','agree')">${s.agree}</td>
          <td class="num clickable" style="color:#d63031;font-weight:600" onclick="goToPlayer(${g},'${reportDate}','${op}','disagree')">${s.disagree}</td>
          <td class="num clickable" style="color:#a29bfe" onclick="goToPlayer(${g},'${reportDate}','${op}','ai_only')">${s.ai_only}</td>
          <td class="num clickable" style="color:#e17055" onclick="goToPlayer(${g},'${reportDate}','${op}','op_only')">${s.op_only}</td>
          <td class="num" style="font-weight:700;color:${accColor}">${acc}%<div class="mini-bar"><div class="mb-agree" style="width:${barW}%"></div><div class="mb-disagree" style="width:${100-barW}%"></div></div></td>
          <td class="num" style="font-weight:700;color:${potColor(pot)}">${pot}%<div class="mini-bar"><div class="mb-covered" style="width:${pot}%"></div><div class="mb-uncovered" style="width:${100-pot}%"></div></div></td></tr>`;
      });
      // group total
      const ga = d.ai;
      if (ga) {
        grandAgree+=ga.agree; grandDisagree+=ga.disagree; grandAiOnly+=ga.ai_only||0; grandOpOnly+=ga.op_only||0; grandProcessed+=ga.processed||0;
        grandMatched+=d.matched||0; grandMismatched+=d.mismatched||0;
        const gAcc = ga.accuracy, gPot = ga.processed ? Math.round((ga.agree + ga.ai_only) / ga.processed * 100) : 0;
        const gDec = ga.agree + ga.disagree, gBarW = gDec > 0 ? Math.round(ga.agree / gDec * 100) : 0;
        const gRecall = (d.matched+d.mismatched) ? Math.round(d.matched/(d.matched+d.mismatched)*100) : 0;
        html += `<tr class="row-subtotal"><td colspan="2" style="font-weight:600;color:${GC[g]}">Итого гр.${g}</td>
          <td class="num" style="font-weight:700;color:${rcColor(gRecall)}">${gRecall}%</td>
          <td class="num clickable" style="color:#00b894;font-weight:600" onclick="goToPlayer(${g},'${reportDate}','','agree')">${ga.agree}</td>
          <td class="num clickable" style="color:#d63031;font-weight:600" onclick="goToPlayer(${g},'${reportDate}','','disagree')">${ga.disagree}</td>
          <td class="num clickable" style="color:#a29bfe" onclick="goToPlayer(${g},'${reportDate}','','ai_only')">${ga.ai_only}</td>
          <td class="num clickable" style="color:#e17055" onclick="goToPlayer(${g},'${reportDate}','','op_only')">${ga.op_only}</td>
          <td class="num" style="color:${gAcc >= 85 ? '#00b894' : gAcc >= 70 ? '#e17055' : '#d63031'};font-weight:700">${gAcc}%<div class="mini-bar"><div class="mb-agree" style="width:${gBarW}%"></div><div class="mb-disagree" style="width:${100-gBarW}%"></div></div></td>
          <td class="num" style="color:${potColor(gPot)};font-weight:700">${gPot}%<div class="mini-bar"><div class="mb-covered" style="width:${gPot}%"></div><div class="mb-uncovered" style="width:${100-gPot}%"></div></div></td></tr>`;
      }
    });

    // grand total
    const gAcc = (grandAgree+grandDisagree) ? Math.round(grandAgree/(grandAgree+grandDisagree)*100) : 0;
    const gPot = grandProcessed ? Math.round((grandAgree+grandAiOnly)/grandProcessed*100) : 0;
    const gBarW = (grandAgree+grandDisagree) > 0 ? Math.round(grandAgree/(grandAgree+grandDisagree)*100) : 0;
    const gRecall = (grandMatched+grandMismatched) ? Math.round(grandMatched/(grandMatched+grandMismatched)*100) : 0;
    html += `<tr class="row-grand"><td colspan="2"><b>ИТОГО</b></td>
      <td class="num"><b>${gRecall}%</b></td>
      <td class="num"><b>${grandAgree}</b></td><td class="num"><b>${grandDisagree}</b></td>
      <td class="num"><b>${grandAiOnly}</b></td><td class="num"><b>${grandOpOnly}</b></td>
      <td class="num"><b>${gAcc}%</b><div class="mini-bar"><div class="mb-agree" style="width:${gBarW}%"></div><div class="mb-disagree" style="width:${100-gBarW}%"></div></div></td>
      <td class="num"><b>${gPot}%</b><div class="mini-bar"><div class="mb-covered" style="width:${gPot}%"></div><div class="mb-uncovered" style="width:${100-gPot}%"></div></div></td></tr>`;

    html += `</table></div></div>`;
  }

  // ═══ SECTION 4: Тренд по дням (recall + AI accuracy) ═══
  if (allDates.length > 1) {
    const aiDates = allDates.filter(date => gNums.some(g => { const d = ALL_GROUPS[g].find(x => x.date === date); return d?.ai?.processed > 0; }));

    html += `<div class="card"><h2>Тренд по дням</h2><div style="overflow-x:auto"><table class="tbl"><tr><th>Дата</th><th class="num">ОН</th><th class="num">УОН</th><th class="num">%УОН</th><th class="num">Recall</th>`;
    if (aiDates.length) html += `<th class="num">AI точн.</th><th class="num">Потенциал</th>`;
    html += `</tr>`;
    allDates.forEach(date => {
      const bd = byDate[date];
      const isActive = date === reportDate;
      html += `<tr${isActive ? ' style="background:#f0f7ff"' : ''}>`;
      html += `<td>${dl[date]?.split(' ')[0] || date}</td>`;
      html += `<td class="num">${bd.sites}</td>`;
      html += `<td class="num">${bd.uph}</td>`;
      html += `<td class="num">${bd.uon_pct}%</td>`;
      html += `<td class="num" style="font-weight:700;color:${rcColor(bd.recall)}">${bd.recall}%</td>`;
      if (aiDates.length) {
        // AI accuracy for this date
        let dAgree=0, dDisagree=0, dAiOnly2=0, dProc=0;
        gNums.forEach(g => {
          const d = ALL_GROUPS[g].find(x => x.date === date);
          if (d?.ai?.processed > 0) { dAgree+=d.ai.agree||0; dDisagree+=d.ai.disagree||0; dAiOnly2+=d.ai.ai_only||0; dProc+=d.ai.processed||0; }
        });
        if (dProc > 0) {
          const dDec = dAgree+dDisagree;
          const dAcc = dDec ? Math.round(dAgree/dDec*100) : 0;
          const dPot = Math.round((dAgree+dAiOnly2)/dProc*100);
          html += `<td class="num" style="font-weight:600;color:${dAcc >= 85 ? '#00b894' : dAcc >= 70 ? '#e17055' : '#d63031'}">${dAcc}%</td>`;
          html += `<td class="num" style="font-weight:600;color:${potColor(dPot)}">${dPot}%</td>`;
        } else {
          html += `<td class="num">\u2014</td><td class="num">\u2014</td>`;
        }
      }
      html += `</tr>`;
    });
    html += `</table></div></div>`;
  }

  // ═══ SECTION 5: Recall по операторам (детальная таблица) ═══
  html += `<div class="card"><h2>Recall по операторам</h2>`;
  gNums.forEach(g => {
    const dates = ALL_GROUPS[g];
    if (!dates.some(d => d.operators)) return;
    const opN = [];
    dates.forEach(d => { if (!d.operators) return; Object.keys(d.operators).forEach(n => { if (!opN.includes(n)) opN.push(n); }); });

    html += `<h3 style="color:${GC[g]};margin:16px 0 8px">Группа ${g}</h3><table class="tbl">
      <tr><th>Дата</th>${opN.map(n => `<th class="num">${n}</th>`).join('')}<th class="num">Группа</th></tr>`;
    dates.forEach(d => {
      const isActive = d.date === reportDate;
      html += `<tr${isActive ? ' style="background:#f0f7ff"' : ''}>`;
      html += `<td>${d.label.split(' ')[0]}</td>`;
      opN.forEach(n => {
        const s = d.operators?.[n];
        if (!s) { html += '<td class="num">\u2014</td>'; return; }
        html += `<td class="num" style="color:${rcColor(s.recall)};font-weight:600">${s.recall}%</td>`;
      });
      html += `<td class="num" style="font-weight:700;color:${rcColor(d.recall)}">${d.recall}%</td></tr>`;
    });
    html += `</table>`;
  });
  html += `</div>`;

  // methodology
  html += `<div class="card"><h2>Как читать</h2>
    <div style="font-size:13px;line-height:1.7;color:#636e72">
      <p><b>Recall</b> = Совпал / (Совпал + Не совпал) — доля правильных определений оператором</p>
      <p><b>УОН</b> = уникальные обратные номера, <b>%УОН</b> = УОН / кол-во проверок</p>
      <p><b>Точность AI</b> = AI=ОП / (AI=ОП + AI≠ОП) — когда оба нашли номер, как часто совпадают</p>
      <p><b>Потенциал</b> = (AI=ОП + Только AI) / Обработано — долю которую AI покроет сам</p>
    </div></div>`;

  c.innerHTML = html;
}

// ─── AI Review tab ───

let _goToPlayerPending = null; // pending navigation target

async function goToPlayer(group, date, operator, aiFilter) {
  // save target so loadDate/loadGroup know to defer applyFilters
  _goToPlayerPending = { date, operator, aiFilter };

  // switch to player tab first
  currentTab = "player";
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === 0));
  document.getElementById("playerView").classList.remove("hidden");
  document.getElementById("playerControls").style.display = "flex";
  document.getElementById("dateStats").style.display = "flex";
  document.getElementById("analyticsView").classList.remove("visible");

  // load group (this also loads latest date via loadDate inside)
  currentGroup = group;
  document.getElementById("groupFilter").value = group;
  await loadGroup();

  // now load the target date
  document.getElementById("dateFilter").value = date;
  await loadDate(date);

  // set filters AFTER data is loaded
  if (operator) document.getElementById("opFilter").value = operator;
  document.getElementById("aiFilter").value = aiFilter || "all";
  document.getElementById("filter").value = "all";
  document.getElementById("search").value = "";

  _goToPlayerPending = null;

  updateStatusCounts();
  applyFilters();
  saveFilters();
}

// localStorage helpers for operator verdicts
function getVerdict(group, date, idx) {
  try {
    const raw = localStorage.getItem(`review_${group}_${date}_${idx}`);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveVerdict(group, date, idx, verdict, comment) {
  const data = { verdict, comment, ts: new Date().toISOString() };
  localStorage.setItem(`review_${group}_${date}_${idx}`, JSON.stringify(data));
  // flash "saved" indicator
  const el = document.getElementById(`saved-${idx}`);
  if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
}

function countReviewed(group, date, operator) {
  let count = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith(`review_${group}_${date}_`)) {
      // if operator filter, need to check the actual data — for simplicity count all for group+date
      count++;
    }
  }
  return count;
}

function exportVerdicts() {
  const rows = [['group','date','idx','site','operator','operator_phone','ai_phone','verdict','comment']];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const m = key.match(/^review_(\d+)_(\d{4}-\d{2}-\d{2})_(\d+)$/);
    if (!m) continue;
    const v = JSON.parse(localStorage.getItem(key));
    // find row data from current DATA if available
    const row = DATA.find(d => d.idx == m[3]);
    rows.push([m[1], m[2], m[3], row?.site||'', row?.operator||'', row?.operator_phone||'', row?.ai_phone||'', v.verdict, v.comment||'']);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ai_review_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── Focus review mode: one item at a time ───

function renderFocusMode() {
  const listEl = document.getElementById("list");
  const stickyNav = document.getElementById("stickyNav");
  const date = document.getElementById('dateFilter').value;
  const aiF = document.getElementById("aiFilter").value;
  const isReviewMode = (aiF === 'disagree' || aiF === 'ai_only');

  if (!FILTERED.length) {
    // show nav with 0/0 so it doesn't disappear
    stickyNav.innerHTML =
      `<div class="disagree-nav">
        <button disabled>&#9664; Пред</button>
        <span class="nav-counter">0 из 0</span>
        <button disabled>След &#9654;</button>
      </div>`;
    listEl.innerHTML = '<div class="empty">Ничего не найдено</div>';
    document.getElementById("count").textContent = '0 из 0';
    return;
  }

  if (focusIdx < 0) focusIdx = 0;
  if (focusIdx >= FILTERED.length) focusIdx = FILTERED.length - 1;

  const d = FILTERED[focusIdx];

  // review stats (only for disagree/ai_only modes)
  let reviewHtml = '';
  if (isReviewMode) {
    const reviewed = FILTERED.filter(x => getVerdict(currentGroup, date, x.idx)).length;
    reviewHtml = `<span class="nav-reviewed">${reviewed} проверено</span>
      <button class="export-btn" onclick="exportVerdicts()">Экспорт</button>`;
  }

  // nav bar — always same layout: [Пред] [counter] [reviewed?] [След] [export?]
  stickyNav.innerHTML =
    `<div class="disagree-nav">
      <button onclick="focusNav(-1)">&#9664; Пред</button>
      <span class="nav-counter">${focusIdx + 1} из ${FILTERED.length}</span>
      ${reviewHtml}
      <button onclick="focusNav(1)">След &#9654;</button>
    </div>`;

  // render single row
  listEl.innerHTML = renderRow(d, focusIdx);
  document.getElementById("count").textContent = `${focusIdx + 1} из ${FILTERED.length}`;

  // mark reviewed if has verdict
  const isReviewed = !!getVerdict(currentGroup, date, d.idx);
  if (isReviewed) {
    const row = listEl.querySelector('.row');
    if (row) row.classList.add('row-reviewed');
  }

  // expand all transcripts
  listEl.querySelectorAll('.rec-text').forEach(el => {
    el.style.maxHeight = 'none';
    el.style.overflow = 'visible';
  });
  listEl.querySelectorAll('.expand-btn').forEach(btn => {
    btn.textContent = 'свернуть';
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function focusNav(dir) {
  if (!FILTERED.length) return;
  focusIdx += dir;
  if (focusIdx >= FILTERED.length) focusIdx = 0;
  if (focusIdx < 0) focusIdx = FILTERED.length - 1;
  // stop any playing audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.remove();
    const oldBtn = document.querySelector('.audio-btn.playing');
    if (oldBtn) { oldBtn.classList.remove('playing'); oldBtn.innerHTML = '&#9654;'; }
    currentAudio = null;
  }
  renderFocusMode();
  saveFilters();
}

function updateReviewCounter() {
  if (focusMode) { renderFocusMode(); return; }
  const el = document.getElementById('navReviewed');
  if (!el) return;
  const date = document.getElementById('dateFilter').value;
  const reviewed = FILTERED.filter(d => getVerdict(currentGroup, date, d.idx)).length;
  el.textContent = `${reviewed} из ${FILTERED.length} проверено`;
}

// keyboard navigation in focus mode
document.addEventListener('keydown', e => {
  if (!focusMode) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); focusNav(-1); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); focusNav(1); }
});

// ─── Data loading ───

async function loadGroup() {
  const base = getBase();
  document.getElementById("list").innerHTML = '<div class="loading">Загрузка данных...</div>';
  document.getElementById("search").value = "";
  document.getElementById("filter").value = "all";

  try {
    const resp = await fetch(base + "dates.json");
    const dates = await resp.json();
    DATES = dates;
    ALL_GROUPS[currentGroup] = dates;
    const sel = document.getElementById("dateFilter");
    sel.innerHTML = dates.map(d =>
      `<option value="${d.date}">${d.label} — ${d.sites} сайтов, recall ${d.recall}%</option>`
    ).join("");
    const latest = dates[dates.length - 1];
    sel.value = latest.date;
    document.getElementById("subtitle").textContent =
      `${dates.length} дат (${dates[0].label} — ${latest.label}) · Группа ${currentGroup}`;
    await loadDate(latest.date);
  } catch(e) {
    document.getElementById("list").innerHTML =
      '<div class="empty">Не удалось загрузить dates.json</div>';
  }
}

async function loadDate(dateIso) {
  const base = getBase();
  document.getElementById("list").innerHTML = '<div class="loading">Загрузка данных...</div>';
  try {
    const resp = await fetch(base + dateIso + ".json");
    DATA = await resp.json();
    assignOpColors();
    populateOperators();

    // skip applyFilters if goToPlayer will handle it (sets operator/AI filters after loadDate)
    if (!_goToPlayerPending) {
      updateStatusCounts();
      applyFilters();
    }

    const d = DATES.find(x => x.date === dateIso);
    if (d) {
      const aiLabel = d.ai ? ` · AI ${d.ai.accuracy}%` : '';
      document.getElementById("subtitle").textContent =
        `${d.label} · Группа ${currentGroup} · ${d.sites} сайтов · Recall ${d.recall}%${aiLabel}`;
      let statsHtml = `<span>Совпал: ${d.matched}</span><span>Не совпал: ${d.mismatched}</span><span>Оп. пусто: ${d.op_empty}</span><span>Нет записей: ${d.no_recs}</span>`;
      if (d.ai) {
        statsHtml += `<span style="color:#a29bfe">AI: ${d.ai.agree}\u2714 ${d.ai.disagree}\u2716 ${d.ai.accuracy}%</span>`;
      }
      document.getElementById("dateStats").innerHTML = statsHtml;
    }
  } catch(e) {
    document.getElementById("list").innerHTML = `<div class="empty">Не удалось загрузить ${dateIso}.json</div>`;
  }
}

// save filter state to localStorage on any change
function saveFilters() {
  const state = {
    group: currentGroup,
    date: document.getElementById('dateFilter').value,
    op: document.getElementById('opFilter').value,
    filter: document.getElementById('filter').value,
    ai: document.getElementById('aiFilter').value,
    tab: currentTab,
  };
  localStorage.setItem('on_player_filters', JSON.stringify(state));
}

function getSavedFilters() {
  try { return JSON.parse(localStorage.getItem('on_player_filters')); } catch { return null; }
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter").addEventListener("change", () => { applyFilters(); saveFilters(); });
document.getElementById("aiFilter").addEventListener("change", () => { applyFilters(); saveFilters(); });
document.getElementById("opFilter").addEventListener("change", () => { updateStatusCounts(); applyFilters(); saveFilters(); });
document.getElementById("dateFilter").addEventListener("change", (e) => { loadDate(e.target.value).then(saveFilters); });

// Init — restore saved filters or load defaults
async function init() {
  const saved = getSavedFilters();
  if (saved) {
    currentGroup = saved.group || 1;
    document.getElementById("groupFilter").value = currentGroup;
    await loadGroup();

    // restore date if available
    if (saved.date) {
      const sel = document.getElementById('dateFilter');
      if ([...sel.options].some(o => o.value === saved.date)) {
        sel.value = saved.date;
        await loadDate(saved.date);
      }
    }

    // restore filters
    if (saved.op) document.getElementById('opFilter').value = saved.op;
    if (saved.filter) document.getElementById('filter').value = saved.filter;
    if (saved.ai) document.getElementById('aiFilter').value = saved.ai;
    updateStatusCounts();
    applyFilters();

    // restore tab
    if (saved.tab && saved.tab !== 'player') {
      // ai_review was merged into analytics
      switchTab(saved.tab === 'ai_review' ? 'analytics' : saved.tab);
    }
  } else {
    loadGroup();
  }
}
init();
</script>

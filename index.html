<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сбор ОН</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#f5f6fa; color:#2d3436; }
.header { background:#2d3436; color:#fff; padding:20px 24px; position:sticky; top:0; z-index:10; }
.header h1 { font-size:18px; font-weight:600; }
.header .sub { font-size:13px; opacity:0.7; margin-top:4px; }
.group-tabs { display:flex; gap:6px; margin-top:10px; }
.group-tab { padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer;
  background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); border:none; transition:all 0.2s; }
.group-tab.active { background:#0984e3; color:#fff; }
.group-tab:hover:not(.active) { background:rgba(255,255,255,0.2); }
.tabs { display:flex; gap:4px; margin-top:10px; }
.tab { padding:8px 18px; border-radius:8px 8px 0 0; font-size:13px; font-weight:600; cursor:pointer;
       background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); border:none; }
.tab.active { background:#f5f6fa; color:#2d3436; }
.controls { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; align-items:center; }
.controls input { padding:8px 12px; border:none; border-radius:6px; font-size:14px; width:220px; }
.controls select { padding:8px 12px; border:none; border-radius:6px; font-size:13px; background:#fff; cursor:pointer; }
.controls .count { font-size:13px; opacity:0.8; margin-left:auto; }
.date-stats { display:flex; gap:16px; margin-top:10px; font-size:12px; opacity:0.8; flex-wrap:wrap; }
.date-stats span { background:rgba(255,255,255,0.1); padding:3px 10px; border-radius:10px; }
.container { max-width:1100px; margin:0 auto; padding:16px; }
.row { background:#fff; border-radius:10px; margin-bottom:10px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.row.matched { border-left:4px solid #00b894; }
.row.mismatched { border-left:4px solid #d63031; }
.row.op-empty { border-left:4px solid #fdcb6e; }
.row.no-recs { border-left:4px solid #dfe6e9; }
.row-top { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.row-num { font-size:12px; color:#b2bec3; min-width:30px; }
.op-badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; color:#fff; }
.site { font-weight:600; font-size:14px; color:#0984e3; word-break:break-all; }
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.badge.green { background:#e8f8e8; color:#00b894; }
.badge.red { background:#ffe8e8; color:#d63031; }
.badge.yellow { background:#fff8e8; color:#e17055; }
.badge.gray { background:#f0f0f0; color:#636e72; }
.meta { display:flex; gap:20px; font-size:12px; color:#636e72; flex-wrap:wrap; margin-bottom:10px; }
.meta span { display:flex; align-items:center; gap:4px; }
.recordings { margin-top:8px; }
.rec { display:flex; gap:12px; align-items:flex-start; padding:10px; background:#f8f9fa; border-radius:8px; margin-bottom:6px; }
.rec-info { flex:1; min-width:0; }
.rec-callerid { font-weight:600; font-size:13px; }
.rec-conf { font-size:11px; color:#636e72; }
.rec-text { font-size:12px; color:#2d3436; margin-top:4px; line-height:1.5; max-height:60px; overflow:hidden; }
.rec-text.expanded { max-height:none; }
.expand-btn { font-size:11px; color:#0984e3; cursor:pointer; border:none; background:none; margin-top:2px; }
.audio-btn { flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  width:36px; height:36px; background:#0984e3; color:#fff; border-radius:50%; font-size:14px;
  border:none; cursor:pointer; }
.audio-btn:hover { background:#0770c2; }
.audio-btn.playing { background:#d63031; }
.audio-inline { flex-shrink:0; width:220px; height:32px; margin-top:4px; }
.empty { text-align:center; padding:40px; color:#b2bec3; font-size:14px; }
.load-more { display:block; width:100%; padding:14px; background:#fff; border:2px dashed #dfe6e9; border-radius:10px; font-size:14px; color:#0984e3; cursor:pointer; text-align:center; margin:10px 0; font-weight:600; }
.load-more:hover { background:#f0f7ff; border-color:#0984e3; }
.loading { text-align:center; padding:40px; color:#b2bec3; font-size:14px; }

/* Analytics */
.analytics { display:none; }
.analytics.visible { display:block; }
.player-view { display:block; }
.player-view.hidden { display:none; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.card h2 { font-size:16px; font-weight:600; margin-bottom:16px; color:#2d3436; }
.card h3 { font-size:14px; font-weight:600; margin:16px 0 8px; color:#636e72; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
.stat-box { background:#f8f9fa; border-radius:10px; padding:16px; text-align:center; }
.stat-box .val { font-size:28px; font-weight:700; color:#0984e3; }
.stat-box .lbl { font-size:12px; color:#636e72; margin-top:4px; }
.stat-box.green .val { color:#00b894; }
.stat-box.red .val { color:#d63031; }
.stat-box.yellow .val { color:#e17055; }

/* Chart */
.chart { margin:12px 0; }
.chart-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.chart-label { width:50px; font-size:12px; color:#636e72; text-align:right; flex-shrink:0; }
.chart-bar-wrap { flex:1; height:24px; background:#f0f0f0; border-radius:4px; position:relative; overflow:hidden; }
.chart-bar { height:100%; border-radius:4px; transition:width 0.5s; display:flex; }
.chart-bar .seg { height:100%; }
.chart-bar .seg.matched { background:#00b894; }
.chart-bar .seg.mismatched { background:#d63031; }
.chart-bar .seg.op-empty { background:#fdcb6e; }
.chart-bar .seg.no-recs { background:#dfe6e9; }
.chart-val { width:50px; font-size:12px; font-weight:600; color:#2d3436; flex-shrink:0; }

/* Table */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th { text-align:left; padding:8px 12px; background:#f8f9fa; font-weight:600; color:#636e72; border-bottom:2px solid #dfe6e9; }
.tbl td { padding:8px 12px; border-bottom:1px solid #f0f0f0; }
.tbl tr:hover td { background:#f8f9fa; }
.tbl .num { text-align:right; font-variant-numeric:tabular-nums; }

.legend { display:flex; gap:16px; margin:12px 0; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:12px; color:#636e72; }
.legend-dot { width:12px; height:12px; border-radius:3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Сбор ОН</h1>
  <div class="group-tabs" id="groupTabs">
    <button class="group-tab active" data-group="1" onclick="switchGroup(1)">Группа 1</button>
    <button class="group-tab" data-group="2" onclick="switchGroup(2)">Группа 2</button>
    <button class="group-tab" data-group="3" onclick="switchGroup(3)">Группа 3</button>
    <button class="group-tab" data-group="4" onclick="switchGroup(4)">Группа 4</button>
  </div>
  <div class="sub" id="subtitle">Загрузка...</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('player')">Записи</button>
    <button class="tab" onclick="switchTab('analytics')">Аналитика</button>
  </div>
  <div class="controls player-controls" id="playerControls">
    <select id="dateFilter"><option value="">Загрузка дат...</option></select>
    <input type="text" id="search" placeholder="Поиск по сайту, номеру, тексту...">
    <select id="opFilter">
      <option value="all">Все операторы</option>
    </select>
    <select id="filter">
      <option value="all">Все статусы</option>
      <option value="matched">Совпал</option>
      <option value="mismatched">Не совпал</option>
      <option value="op-empty">Оператор пусто</option>
      <option value="no-recs">Нет записей</option>
    </select>
    <div class="count" id="count"></div>
  </div>
  <div class="date-stats" id="dateStats"></div>
</div>

<div class="player-view" id="playerView">
  <div class="container" id="list"></div>
</div>

<div class="analytics" id="analyticsView">
  <div class="container" id="analyticsContent"></div>
</div>

<script>
let DATA = [];
let DATES = [];
let FILTERED = [];
let SHOWN = 0;
const PAGE = 50;
let currentTab = "player";
let currentGroup = 1;
let ALL_GROUPS = {}; // {1: [dates], 2: [dates], ...} for cross-group analytics

// dynamic color palette for operators (assigned by position in loaded data)
const OP_PALETTE = ["#636e72", "#a29bfe", "#fd79a8", "#00cec9"];
let OP_COLORS = {};

function getBase() { return `data/group${currentGroup}/`; }

function assignOpColors() {
  const ops = [...new Set(DATA.map(d => d.operator))];
  OP_COLORS = {};
  ops.forEach((op, i) => { OP_COLORS[op] = OP_PALETTE[i % OP_PALETTE.length]; });
}

function populateOperators() {
  const ops = [...new Set(DATA.map(d => d.operator))];
  const sel = document.getElementById("opFilter");
  const prev = sel.value;
  sel.innerHTML = '<option value="all">Все операторы</option>' +
    ops.map(op => `<option value="${op}">${op}</option>`).join("");
  if (ops.includes(prev)) sel.value = prev;
}

function switchGroup(num) {
  currentGroup = num;
  document.querySelectorAll(".group-tab").forEach(t =>
    t.classList.toggle("active", parseInt(t.dataset.group) === num));
  loadGroup();
}

async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === (tab==="player"?0:1)));
  document.getElementById("playerView").classList.toggle("hidden", tab !== "player");
  document.getElementById("playerControls").style.display = tab === "player" ? "flex" : "none";
  document.getElementById("dateStats").style.display = tab === "player" ? "flex" : "none";
  document.getElementById("analyticsView").classList.toggle("visible", tab === "analytics");
  if (tab === "analytics") {
    document.getElementById("analyticsContent").innerHTML = '<div class="loading">Загрузка аналитики по всем группам...</div>';
    await loadAllGroupsData();
    renderAnalytics();
  }
}

async function loadAllGroupsData() {
  const fetches = [];
  for (let g = 1; g <= 4; g++) {
    if (ALL_GROUPS[g]) continue;
    fetches.push(
      fetch(`data/group${g}/dates.json`)
        .then(r => r.json())
        .then(data => { ALL_GROUPS[g] = data; })
        .catch(() => {})
    );
  }
  await Promise.all(fetches);
}

function statusInfo(st) {
  const map = {
    "Совпал": { cls: "matched", badge: "green", label: "Совпал" },
    "Не совпал": { cls: "mismatched", badge: "red", label: "Не совпал" },
    "Оператор пусто, есть звонки": { cls: "op-empty", badge: "yellow", label: "Оператор пусто" },
    "Нет записей": { cls: "no-recs", badge: "gray", label: "Нет записей" },
    "Оператор нашёл, записей нет": { cls: "no-recs", badge: "gray", label: "Оп. нашёл, нет записей" },
  };
  return map[st] || { cls: "", badge: "gray", label: st };
}

function updateStatusCounts() {
  const op = document.getElementById("opFilter").value;
  const base = op === "all" ? DATA : DATA.filter(d => d.operator === op);
  const c = {};
  base.forEach(d => { c[d.status] = (c[d.status] || 0) + 1; });
  const sel = document.getElementById("filter");
  sel.options[1].textContent = `Совпал (${c["Совпал"]||0})`;
  sel.options[2].textContent = `Не совпал (${c["Не совпал"]||0})`;
  sel.options[3].textContent = `Оператор пусто (${c["Оператор пусто, есть звонки"]||0})`;
  sel.options[4].textContent = `Нет записей (${(c["Нет записей"]||0)+(c["Оператор нашёл, записей нет"]||0)})`;
}

function applyFilters() {
  const query = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;
  const opFilter = document.getElementById("opFilter").value;

  FILTERED = DATA.filter(d => {
    if (opFilter !== "all" && d.operator !== opFilter) return false;
    if (filter === "matched" && d.status !== "Совпал") return false;
    if (filter === "mismatched" && d.status !== "Не совпал") return false;
    if (filter === "op-empty" && d.status !== "Оператор пусто, есть звонки") return false;
    if (filter === "no-recs" && !d.status.includes("Нет записей") && d.status !== "Оператор нашёл, записей нет") return false;
    if (query) {
      const h = [d.site, d.phone, d.operator_phone, d.nisha, d.client, d.operator,
        ...d.recs.map(r => r.callerid + " " + r.transcript)].join(" ").toLowerCase();
      if (!h.includes(query)) return false;
    }
    return true;
  });

  SHOWN = 0;
  document.getElementById("list").innerHTML = "";
  document.getElementById("count").textContent = `Показано: 0 из ${FILTERED.length}`;
  showMore();
}

function renderRow(d, globalIdx) {
  const si = statusInfo(d.status);
  const opColor = OP_COLORS[d.operator] || "#636e72";
  const recsHtml = d.recs.length ? d.recs.map((r, ri) => `
    <div class="rec">
      <div class="rec-info">
        <span class="rec-callerid">${r.callerid}</span>
        <span class="rec-conf">&nbsp;&middot;&nbsp;${r.conf}</span>
        <div class="rec-text" id="txt-${globalIdx}-${ri}">${escHtml(r.transcript)}</div>
        ${r.transcript.length > 120 ? `<button class="expand-btn" onclick="toggleText(${globalIdx},${ri})">показать всё</button>` : ""}
      </div>
      ${r.audio ? `<button class="audio-btn" onclick="playAudio(this,'${escAttr(r.audio)}')">&#9654;</button>` : ""}
    </div>
  `).join("") : '<div style="font-size:12px;color:#b2bec3;padding:8px">Нет записей с речью</div>';

  return `
    <div class="row ${si.cls}">
      <div class="row-top">
        <span class="row-num">#${d.idx}</span>
        <span class="op-badge" style="background:${opColor}">${escHtml(d.operator)}</span>
        <span class="site">${escHtml(d.site)}</span>
        <span class="badge ${si.badge}">${si.label}</span>
      </div>
      <div class="meta">
        <span>Тел: <b>${d.phone}</b></span>
        <span>Оператор: <b>${d.operator_phone || "—"}</b></span>
        <span>Записей: ${d.total_recs} (sil: ${d.silence}, речь: ${d.recs.length})</span>
        <span>Ниша: ${d.nisha || "—"}</span>
      </div>
      <div class="recordings">${recsHtml}</div>
    </div>`;
}

function showMore() {
  const container = document.getElementById("list");
  const oldBtn = document.getElementById("loadMoreBtn");
  if (oldBtn) oldBtn.remove();

  if (!FILTERED.length && SHOWN === 0) {
    container.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }

  const end = Math.min(SHOWN + PAGE, FILTERED.length);
  let html = "";
  for (let i = SHOWN; i < end; i++) {
    html += renderRow(FILTERED[i], i);
  }
  container.insertAdjacentHTML("beforeend", html);
  SHOWN = end;

  document.getElementById("count").textContent = `Показано: ${SHOWN} из ${FILTERED.length}`;

  if (SHOWN < FILTERED.length) {
    container.insertAdjacentHTML("beforeend",
      `<button class="load-more" id="loadMoreBtn" onclick="showMore()">Показать ещё ${Math.min(PAGE, FILTERED.length - SHOWN)} из ${FILTERED.length - SHOWN} оставшихся</button>`);
  }
}

function toggleText(i, ri) {
  const el = document.getElementById(`txt-${i}-${ri}`);
  if (el) el.classList.toggle("expanded");
}

function escHtml(s) { return s ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }
function escAttr(s) { return s ? s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;") : ""; }

// Proxy HTTP audio through Netlify to avoid mixed content blocking
function proxyAudioUrl(url) {
  return url.replace('http://assist.intmarksol.com/api/', '/audio');
}

let currentAudio = null;
function playAudio(btn, rawUrl) {
  const url = proxyAudioUrl(rawUrl);
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.remove();
    const oldBtn = document.querySelector('.audio-btn.playing');
    if (oldBtn) { oldBtn.classList.remove('playing'); oldBtn.innerHTML = '&#9654;'; }
    if (currentAudio._btn === btn) { currentAudio = null; return; }
    currentAudio = null;
  }
  const audio = document.createElement('audio');
  audio.controls = true;
  audio.className = 'audio-inline';
  audio.src = url;
  audio._btn = btn;
  btn.parentElement.appendChild(audio);
  audio.play().catch(() => {
    audio.remove();
    window.open(url, '_blank');
  });
  btn.classList.add('playing');
  btn.innerHTML = '&#9632;';
  currentAudio = audio;
  audio.addEventListener('ended', () => {
    btn.classList.remove('playing');
    btn.innerHTML = '&#9654;';
    audio.remove();
    currentAudio = null;
  });
}

// ─── Analytics (cross-group dashboard) ───

function rcColor(v) { return v >= 90 ? '#00b894' : v >= 70 ? '#e17055' : '#d63031'; }

function renderAnalytics() {
  const c = document.getElementById("analyticsContent");
  const gNums = Object.keys(ALL_GROUPS).map(Number).sort();
  if (!gNums.length) { c.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  const GC = ['','#0984e3','#00b894','#e17055','#d63031'];
  const SC = { m:'#00b894', mis:'#d63031', oe:'#fdcb6e', nr:'#dfe6e9' };
  const allDates = [...new Set(gNums.flatMap(g => ALL_GROUPS[g].map(d => d.date)))].sort();
  const dl = {}; gNums.forEach(g => ALL_GROUPS[g].forEach(d => { dl[d.date] = d.label; }));

  // aggregate by date across all groups
  const byDate = {};
  allDates.forEach(date => {
    const a = { sites:0, matched:0, mismatched:0, op_empty:0, no_recs:0 };
    gNums.forEach(g => {
      const d = ALL_GROUPS[g].find(x => x.date === date);
      if (d) { a.sites+=d.sites; a.matched+=d.matched; a.mismatched+=d.mismatched; a.op_empty+=d.op_empty; a.no_recs+=d.no_recs; }
    });
    a.recall = (a.matched+a.mismatched) ? Math.round(a.matched/(a.matched+a.mismatched)*100) : 0;
    byDate[date] = a;
  });

  // report = previous day (yesterday), compare with day before that
  const ri = allDates.length >= 2 ? allDates.length - 2 : allDates.length - 1;
  const last = byDate[allDates[ri]];
  const lastLbl = dl[allDates[ri]];
  const prev = ri > 0 ? byDate[allDates[ri - 1]] : null;

  // delta indicator vs previous day
  function dlt(cur, prv, up) {
    if (prv === null || prv === undefined) return '';
    const d = cur - prv; if (d === 0) return '';
    const ok = up ? d > 0 : d < 0;
    return `<div style="font-size:12px;margin-top:2px;color:${ok?'#00b894':'#d63031'}">${d>0?'↑':'↓'} ${Math.abs(d)}</div>`;
  }

  // stacked bar helper
  function sbar(d, h) {
    const t = d.sites || 1;
    return `<div class="chart-bar-wrap" style="height:${h||28}px"><div class="chart-bar" style="width:100%;display:flex">
      <div class="seg" style="width:${d.matched/t*100}%;background:${SC.m}"></div>
      <div class="seg" style="width:${d.mismatched/t*100}%;background:${SC.mis}"></div>
      <div class="seg" style="width:${d.op_empty/t*100}%;background:${SC.oe}"></div>
      <div class="seg" style="width:${d.no_recs/t*100}%;background:${SC.nr}"></div>
    </div></div>`;
  }

  // ── Section 1: Daily summary (latest day with deltas) ──
  let html = `<div class="card"><h2>Сводка за ${lastLbl}</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="val">${last.sites}</div><div class="lbl">Проверок</div>${dlt(last.sites,prev?.sites,true)}</div>
      <div class="stat-box green"><div class="val">${last.matched}</div><div class="lbl">Совпал</div>${dlt(last.matched,prev?.matched,true)}</div>
      <div class="stat-box red"><div class="val">${last.mismatched}</div><div class="lbl">Не совпал</div>${dlt(last.mismatched,prev?.mismatched,false)}</div>
      <div class="stat-box yellow"><div class="val">${last.op_empty}</div><div class="lbl">Оп. пусто</div>${dlt(last.op_empty,prev?.op_empty,false)}</div>
      <div class="stat-box"><div class="val">${last.no_recs}</div><div class="lbl">Нет записей</div></div>
      <div class="stat-box green"><div class="val">${last.recall}%</div><div class="lbl">Recall</div>${dlt(last.recall,prev?.recall,true)}</div>
    </div></div>`;

  // ── Section 2: Status distribution by days (all groups combined) ──
  html += `<div class="card"><h2>Распределение статусов по дням</h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:${SC.m}"></div>Совпал</div>
      <div class="legend-item"><div class="legend-dot" style="background:${SC.mis}"></div>Не совпал</div>
      <div class="legend-item"><div class="legend-dot" style="background:${SC.oe}"></div>Оп. пусто</div>
      <div class="legend-item"><div class="legend-dot" style="background:${SC.nr}"></div>Нет записей</div>
    </div>`;
  allDates.forEach(date => {
    const d = byDate[date];
    html += `<div class="chart-row" style="margin-bottom:8px">
      <span class="chart-label" style="width:60px">${dl[date].split(' ')[0]}</span>
      ${sbar(d, 28)}
      <span class="chart-val" style="width:50px">${d.sites}</span>
    </div>`;
  });

  // detail table
  html += `<h3 style="margin:20px 0 8px">Детализация по дням</h3><table class="tbl">
    <tr><th>Дата</th><th class="num">Сайтов</th><th class="num">Совпал</th><th class="num">Не совпал</th><th class="num">Оп. пусто</th><th class="num">Нет записей</th><th class="num">Recall</th></tr>`;
  let tS=0,tM=0,tMis=0,tOE=0,tNR=0;
  allDates.forEach(date => {
    const d = byDate[date]; tS+=d.sites; tM+=d.matched; tMis+=d.mismatched; tOE+=d.op_empty; tNR+=d.no_recs;
    html += `<tr><td>${dl[date]}</td><td class="num">${d.sites}</td>
      <td class="num" style="color:#00b894;font-weight:600">${d.matched}</td>
      <td class="num" style="color:#d63031;font-weight:600">${d.mismatched}</td>
      <td class="num" style="color:#e17055;font-weight:600">${d.op_empty}</td>
      <td class="num">${d.no_recs}</td>
      <td class="num" style="font-weight:700;color:${rcColor(d.recall)}">${d.recall}%</td></tr>`;
  });
  const tRc = (tM+tMis)?Math.round(tM/(tM+tMis)*100):0;
  html += `<tr style="font-weight:700;border-top:2px solid #dfe6e9">
    <td>Итого</td><td class="num">${tS}</td>
    <td class="num" style="color:#00b894">${tM}</td><td class="num" style="color:#d63031">${tMis}</td>
    <td class="num" style="color:#e17055">${tOE}</td><td class="num">${tNR}</td>
    <td class="num">${tRc}%</td></tr></table></div>`;

  // ── Section 3: Per group (stacked bars + operators) ──
  gNums.forEach(g => {
    const dates = ALL_GROUPS[g];
    html += `<div class="card"><h2 style="color:${GC[g]}">Группа ${g}</h2>`;

    // stacked bars by date
    dates.forEach(d => {
      html += `<div class="chart-row" style="margin-bottom:8px">
        <span class="chart-label" style="width:60px">${d.label.split(' ')[0]}</span>
        ${sbar(d, 26)}
        <span class="chart-val" style="width:50px">${d.sites}</span>
      </div>`;
    });

    // operator recall by date table
    if (dates.some(d => d.operators)) {
      // collect unique operator names
      const opN = [];
      dates.forEach(d => { if (!d.operators) return; Object.keys(d.operators).forEach(n => { if (!opN.includes(n)) opN.push(n); }); });

      html += `<h3 style="margin:16px 0 8px">Recall по операторам</h3><table class="tbl">
        <tr><th>Дата</th><th class="num">Сайтов</th>${opN.map(n => `<th class="num">${n}</th>`).join('')}<th class="num">Группа</th></tr>`;
      // per-operator aggregates for totals row
      const opA = {}; opN.forEach(n => { opA[n] = {m:0,mis:0}; });
      dates.forEach(d => {
        html += `<tr><td>${d.label.split(' ')[0]}</td><td class="num">${d.sites}</td>`;
        opN.forEach(n => {
          const s = d.operators?.[n];
          if (!s) { html += '<td class="num">—</td>'; return; }
          opA[n].m += s.matched; opA[n].mis += s.mismatched;
          html += `<td class="num" style="color:${rcColor(s.recall)};font-weight:600">${s.recall}% <span style="font-weight:400;color:#636e72;font-size:11px">(${s.matched}/${s.matched+s.mismatched})</span></td>`;
        });
        html += `<td class="num" style="font-weight:700;color:${rcColor(d.recall)}">${d.recall}%</td></tr>`;
      });
      // totals row
      html += `<tr style="font-weight:700;border-top:2px solid #dfe6e9"><td>Итого</td><td class="num"></td>`;
      opN.forEach(n => {
        const s = opA[n], of = s.m+s.mis, rc = of ? Math.round(s.m/of*100) : 0;
        html += `<td class="num" style="color:${rcColor(rc)}">${rc}% <span style="font-weight:400;color:#636e72;font-size:11px">(${s.m}/${of})</span></td>`;
      });
      const gm = dates.reduce((s,d)=>s+d.matched,0), gmis = dates.reduce((s,d)=>s+d.mismatched,0);
      const grc = (gm+gmis)?Math.round(gm/(gm+gmis)*100):0;
      html += `<td class="num" style="color:${rcColor(grc)}">${grc}%</td></tr></table>`;
    }
    html += `</div>`;
  });

  // Methodology
  html += `<div class="card"><h2>Методология</h2>
    <div style="font-size:13px;line-height:1.7;color:#636e72">
      <p><b>Источник:</b> Google Sheets (4 группы × 4 оператора) + API assist.intmarksol.com</p>
      <p><b>Recall</b> = Совпал / (Совпал + Не совпал) — доля подтверждённых автоматикой</p>
      <p><b>Окно поиска:</b> +4 дня от даты заявки</p>
    </div></div>`;

  c.innerHTML = html;
}

// ─── Data loading ───

function loadGroup() {
  const base = getBase();
  document.getElementById("list").innerHTML = '<div class="loading">Загрузка данных...</div>';
  document.getElementById("search").value = "";
  document.getElementById("filter").value = "all";

  fetch(base + "dates.json")
    .then(r => r.json())
    .then(dates => {
      DATES = dates;
      ALL_GROUPS[currentGroup] = dates; // cache for analytics
      const sel = document.getElementById("dateFilter");
      sel.innerHTML = dates.map(d =>
        `<option value="${d.date}">${d.label} — ${d.sites} сайтов, recall ${d.recall}%</option>`
      ).join("");
      const latest = dates[dates.length - 1];
      sel.value = latest.date;
      document.getElementById("subtitle").textContent =
        `${dates.length} дат (${dates[0].label} — ${latest.label}) · Группа ${currentGroup}`;
      loadDate(latest.date);
    })
    .catch(() => {
      document.getElementById("list").innerHTML =
        '<div class="empty">Не удалось загрузить dates.json</div>';
    });
}

async function loadDate(dateIso) {
  const base = getBase();
  document.getElementById("list").innerHTML = '<div class="loading">Загрузка данных...</div>';
  try {
    const resp = await fetch(base + dateIso + ".json");
    DATA = await resp.json();
    assignOpColors();
    populateOperators();
    updateStatusCounts();
    applyFilters();

    const d = DATES.find(x => x.date === dateIso);
    if (d) {
      document.getElementById("subtitle").textContent =
        `${d.label} · Группа ${currentGroup} · ${d.sites} сайтов · Recall ${d.recall}%`;
      document.getElementById("dateStats").innerHTML =
        `<span>Совпал: ${d.matched}</span><span>Не совпал: ${d.mismatched}</span><span>Оп. пусто: ${d.op_empty}</span><span>Нет записей: ${d.no_recs}</span>`;
    }
  } catch(e) {
    document.getElementById("list").innerHTML = `<div class="empty">Не удалось загрузить ${dateIso}.json</div>`;
  }
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter").addEventListener("change", applyFilters);
document.getElementById("opFilter").addEventListener("change", () => { updateStatusCounts(); applyFilters(); });
document.getElementById("dateFilter").addEventListener("change", (e) => loadDate(e.target.value));

// Init
loadGroup();
</script>
</body>

name: Update player data

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 8:00 UTC (11:00 MSK) пн-пт
  workflow_dispatch: {}     # ручной запуск

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA credentials
        run: echo '${{ secrets.GOOGLE_SA_JSON }}' > google_sa.json

      - name: Restore recordings cache
        uses: actions/cache/restore@v4
        with:
          path: recordings_cache.json
          key: recordings-cache-${{ github.run_id }}
          restore-keys: recordings-cache-

      - name: Generate data
        run: python generate_player.py

      - name: Save recordings cache
        uses: actions/cache/save@v4
        with:
          path: recordings_cache.json
          key: recordings-cache-${{ github.run_id }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data $(date +%Y-%m-%d)"
            git push
          fi
